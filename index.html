<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI-News | Daily AI Trends & Insights</title>
  <meta name="description" content="Daily curated AI news, trends, and insights from global and Korean AI communities.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f; --bg2: #111118; --bg3: #1a1a24;
      --border: #2a2a3a; --accent: #7c6aff; --accent2: #a78bfa;
      --text: #e8e8f0; --text2: #9999aa;
      --green: #4ade80; --red: #f87171; --yellow: #fbbf24; --blue: #60a5fa;
      --tag-bg: #1e1e30;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; line-height:1.6; }

    /* Header */
    header { border-bottom:1px solid var(--border); background:rgba(10,10,15,0.95); backdrop-filter:blur(12px); position:sticky; top:0; z-index:100; }
    .header-inner { max-width:1100px; margin:0 auto; padding:0 24px; display:flex; align-items:center; justify-content:space-between; height:64px; }
    .logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
    .logo-icon { width:32px; height:32px; background:linear-gradient(135deg,var(--accent),#c084fc); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; }
    .logo-text { font-size:18px; font-weight:700; color:var(--text); }
    .logo-sub { font-size:11px; color:var(--text2); }
    nav { display:flex; align-items:center; gap:8px; }
    nav a { color:var(--text2); text-decoration:none; font-size:13px; padding:6px 12px; border-radius:6px; transition:all 0.2s; }
    nav a:hover { color:var(--text); background:var(--bg3); }

    /* Language switcher */
    .lang-switcher { display:flex; gap:4px; background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:4px; }
    .lang-btn { background:none; border:none; cursor:pointer; font-size:13px; font-weight:500; padding:4px 10px; border-radius:5px; color:var(--text2); transition:all 0.2s; font-family:'Inter',sans-serif; }
    .lang-btn.active { background:var(--accent); color:#fff; }
    .lang-btn:hover:not(.active) { color:var(--text); background:var(--bg2); }

    /* Hero */
    .hero { border-bottom:1px solid var(--border); padding:64px 24px 48px; text-align:center; background:radial-gradient(ellipse at 50% 0%,rgba(124,106,255,0.12) 0%,transparent 70%); }
    .hero-badge { display:inline-flex; align-items:center; gap:6px; background:var(--tag-bg); border:1px solid var(--border); border-radius:20px; padding:4px 12px; font-size:12px; color:var(--accent2); margin-bottom:20px; }
    .hero-badge span { width:6px; height:6px; background:var(--green); border-radius:50%; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .hero h1 { font-size:42px; font-weight:700; letter-spacing:-1px; margin-bottom:16px; }
    .hero h1 em { background:linear-gradient(135deg,var(--accent),#c084fc); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-style:normal; }
    .hero p { color:var(--text2); font-size:16px; max-width:480px; margin:0 auto; }

    /* Layout */
    .container { max-width:1100px; margin:0 auto; padding:48px 24px; }
    .layout { display:grid; grid-template-columns:1fr 300px; gap:48px; }
    .section-title { font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--text2); margin-bottom:20px; display:flex; align-items:center; gap:8px; }
    .section-title::after { content:''; flex:1; height:1px; background:var(--border); }

    /* Post card */
    .post-card { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:24px; margin-bottom:16px; cursor:pointer; transition:all 0.2s; display:block; text-decoration:none; }
    .post-card:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 8px 32px rgba(124,106,255,0.15); }
    .post-meta { display:flex; align-items:center; gap:12px; margin-bottom:12px; flex-wrap:wrap; }
    .post-date { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--accent2); background:rgba(124,106,255,0.1); border:1px solid rgba(124,106,255,0.2); padding:3px 8px; border-radius:4px; }
    .post-keywords { display:flex; gap:6px; flex-wrap:wrap; }
    .keyword-tag { font-size:11px; color:var(--text2); background:var(--tag-bg); border:1px solid var(--border); padding:2px 8px; border-radius:4px; }
    .post-title { font-size:18px; font-weight:600; margin-bottom:8px; color:var(--text); }
    .post-summary { font-size:14px; color:var(--text2); line-height:1.6; }
    .post-footer { margin-top:16px; padding-top:16px; border-top:1px solid var(--border); display:flex; gap:16px; flex-wrap:wrap; }
    .signal-dot { font-size:12px; color:var(--text2); }

    /* Sidebar */
    .widget { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:20px; }
    .widget-title { font-size:13px; font-weight:600; color:var(--text); margin-bottom:16px; }
    .stat-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); }
    .stat-row:last-child { border-bottom:none; }
    .stat-label { font-size:13px; color:var(--text2); }
    .stat-value { font-size:13px; font-weight:600; color:var(--accent2); font-family:'JetBrains Mono',monospace; }
    .archive-item { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); cursor:pointer; transition:color 0.2s; }
    .archive-item:last-child { border-bottom:none; }
    .archive-item:hover .archive-date { color:var(--accent2); }
    .archive-date { font-size:13px; color:var(--text2); font-family:'JetBrains Mono',monospace; }

    /* Modal */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:200; backdrop-filter:blur(4px); overflow-y:auto; }
    .modal-overlay.active { display:flex; justify-content:center; padding:40px 24px; }
    .modal { background:var(--bg2); border:1px solid var(--border); border-radius:16px; max-width:800px; width:100%; padding:40px; position:relative; animation:slideUp 0.3s ease; }
    @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .modal-close { position:absolute; top:20px; right:20px; background:var(--bg3); border:1px solid var(--border); color:var(--text2); width:32px; height:32px; border-radius:8px; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
    .modal-close:hover { color:var(--text); border-color:var(--accent); }
    .modal-header { margin-bottom:32px; padding-bottom:24px; border-bottom:1px solid var(--border); }
    .modal-date { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--accent2); margin-bottom:12px; }
    .modal-title { font-size:26px; font-weight:700; margin-bottom:12px; }
    .modal-intro { color:var(--text2); font-size:15px; line-height:1.7; }
    .modal-top-keywords { display:flex; gap:8px; margin-top:16px; flex-wrap:wrap; }
    .top-kw { font-size:12px; background:rgba(124,106,255,0.1); border:1px solid rgba(124,106,255,0.2); color:var(--accent2); padding:4px 10px; border-radius:20px; }
    .section-block { margin-bottom:28px; }
    .section-block h3 { font-size:15px; font-weight:600; color:var(--text); margin-bottom:12px; padding-left:12px; border-left:3px solid var(--accent); }
    .section-block p { font-size:14px; color:var(--text2); line-height:1.7; margin-bottom:10px; }
    .bullet-item { display:flex; gap:10px; align-items:flex-start; padding:10px 0; border-bottom:1px solid rgba(42,42,58,0.5); }
    .bullet-item:last-child { border-bottom:none; }
    .bullet-dot { width:6px; height:6px; background:var(--accent); border-radius:50%; margin-top:7px; flex-shrink:0; }
    .bullet-text { font-size:13px; color:var(--text2); line-height:1.6; flex:1; }
    .bullet-text strong { color:var(--text); font-weight:500; }
    .bullet-link { color:var(--accent2); text-decoration:none; font-size:11px; }
    .bullet-link:hover { text-decoration:underline; }
    .insight-box { background:rgba(124,106,255,0.06); border:1px solid rgba(124,106,255,0.2); border-radius:8px; padding:14px 16px; margin-top:12px; }
    .insight-box p { font-size:13px; color:var(--accent2); line-height:1.6; margin:0; }
    .signals-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:16px; }
    .signal-item { background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:12px; }
    .signal-label { font-size:11px; color:var(--text2); margin-bottom:4px; }
    .signal-value { font-size:13px; font-weight:500; }
    .signal-value.hot{color:var(--red)} .signal-value.grow{color:var(--green)} .signal-value.warn{color:var(--yellow)} .signal-value.shift{color:var(--blue)}

    /* Loading / Empty */
    .loading { text-align:center; padding:80px 24px; color:var(--text2); }
    .loading-spinner { width:32px; height:32px; margin:0 auto 16px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .empty { text-align:center; padding:80px 24px; color:var(--text2); }
    .empty h3 { font-size:18px; margin-bottom:8px; color:var(--text); }

    footer { border-top:1px solid var(--border); padding:24px; text-align:center; color:var(--text2); font-size:12px; }
    footer a { color:var(--accent2); text-decoration:none; }

    @media(max-width:768px) { .layout{grid-template-columns:1fr} .sidebar{display:none} .hero h1{font-size:28px} .signals-grid{grid-template-columns:1fr} }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="#">
      <div class="logo-icon">🧠</div>
      <div>
        <div class="logo-text">AI-News</div>
        <div class="logo-sub" data-i18n="subtitle"></div>
      </div>
    </a>
    <nav>
      <div class="lang-switcher">
        <button class="lang-btn" onclick="setLang('ko')">한국어</button>
        <button class="lang-btn" onclick="setLang('en')">English</button>
      </div>
      <a href="https://github.com/fireicecool/AI-News" target="_blank">GitHub</a>
    </nav>
  </div>
</header>

<div class="hero">
  <div class="hero-badge"><span></span> <span data-i18n="badge"></span></div>
  <h1><span data-i18n="hero_title1"></span> <em data-i18n="hero_title2"></em><br><span data-i18n="hero_title3"></span></h1>
  <p data-i18n="hero_desc"></p>
</div>

<div class="container">
  <div class="layout">
    <main>
      <div class="section-title" data-i18n="latest_posts"></div>
      <div id="posts-container">
        <div class="loading"><div class="loading-spinner"></div><p data-i18n="loading"></p></div>
      </div>
    </main>
    <aside class="sidebar">
      <div class="widget">
        <div class="widget-title" data-i18n="stats"></div>
        <div class="stat-row"><span class="stat-label" data-i18n="total_posts"></span><span class="stat-value" id="stat-total">—</span></div>
        <div class="stat-row"><span class="stat-label" data-i18n="last_updated"></span><span class="stat-value" id="stat-last">—</span></div>
        <div class="stat-row"><span class="stat-label" data-i18n="coverage"></span><span class="stat-value" data-i18n="coverage_val"></span></div>
      </div>
      <div class="widget">
        <div class="widget-title" data-i18n="archive"></div>
        <div id="archive-list"></div>
      </div>
    </aside>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-content">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<footer>
  <p data-i18n="footer"></p>
</footer>

<script>
// ── i18n ──────────────────────────────────────────────
const I18N = {
  ko: {
    subtitle:     'Daily AI 트렌드 & 인사이트',
    badge:        '매일 오전 8시 자동 업데이트',
    hero_title1:  '글로벌',
    hero_title2:  'AI 트렌드',
    hero_title3:  '매일 큐레이션',
    hero_desc:    '글로벌 & 한국 AI 커뮤니티의 인사이트, 툴, 리서치를 매일 아침 전달합니다.',
    latest_posts: '최신 포스트',
    loading:      '불러오는 중...',
    stats:        '📊 통계',
    total_posts:  '총 포스트',
    last_updated: '마지막 업데이트',
    coverage:     '커버리지',
    coverage_val: '글로벌 + KR',
    archive:      '🗓 아카이브',
    no_posts:     '아직 포스트가 없습니다',
    no_posts_sub: '내일 오전 8시부터 AI 뉴스가 업데이트됩니다.',
    community_temp: '📊 커뮤니티 온도',
    hot: '🔴 과열',
    grow: '🟢 성장',
    warn: '🟡 주의',
    shift: '🔵 패러다임 전환',
    footer: 'Built with ❤️ by <a href="https://github.com/fireicecool" target="_blank">fireicecool</a> · Powered by Claude AI · <a href="https://github.com/fireicecool/AI-News" target="_blank">GitHub에서 보기</a>',
  },
  en: {
    subtitle:     'Daily AI Trends & Insights',
    badge:        'Auto-updated daily at 08:00 KST',
    hero_title1:  'Global',
    hero_title2:  'AI Trends',
    hero_title3:  'Curated Daily',
    hero_desc:    'Korean & global AI community insights, tools, and research — delivered every morning.',
    latest_posts: 'Latest Posts',
    loading:      'Loading posts...',
    stats:        '📊 Stats',
    total_posts:  'Total Posts',
    last_updated: 'Last Updated',
    coverage:     'Coverage',
    coverage_val: 'Global + KR',
    archive:      '🗓 Archive',
    no_posts:     'No posts yet',
    no_posts_sub: 'Daily AI news will appear here starting tomorrow at 08:00 KST.',
    community_temp: '📊 Community Temperature',
    hot: '🔴 Overheat',
    grow: '🟢 Real Growth',
    warn: '🟡 Caution',
    shift: '🔵 Paradigm Shift',
    footer: 'Built with ❤️ by <a href="https://github.com/fireicecool" target="_blank">fireicecool</a> · Powered by Claude AI · <a href="https://github.com/fireicecool/AI-News" target="_blank">View on GitHub</a>',
  }
};

// ── Language detection & switching ─────────────────────
let currentLang = 'en';

function detectLang() {
  const nav = navigator.language || navigator.userLanguage || 'en';
  const code = nav.toLowerCase().split('-')[0];
  return code === 'ko' ? 'ko' : 'en';
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('ai-news-lang', lang);
  applyLang();
  renderPosts(allPosts);
  renderSidebar(allPosts);
  document.documentElement.lang = lang === 'ko' ? 'ko' : 'en';
}

function applyLang() {
  const t = I18N[currentLang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key] !== undefined) el.innerHTML = t[key];
  });
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.trim() === (currentLang === 'ko' ? '한국어' : 'English'));
  });
}

// ── Data ────────────────────────────────────────────────
const REPO_OWNER = 'fireicecool';
const REPO_NAME  = 'AI-News';
const DATA_URL   = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/data/posts.json`;
let allPosts = [];

async function loadPosts() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error();
    allPosts = await res.json();
    renderPosts(allPosts);
    renderSidebar(allPosts);
  } catch(e) {
    const t = I18N[currentLang];
    document.getElementById('posts-container').innerHTML =
      `<div class="empty"><h3>${t.no_posts}</h3><p>${t.no_posts_sub}</p></div>`;
  }
}

// ── Render ──────────────────────────────────────────────
function getT(post) {
  // post.translations.ko / post.translations.en
  return (post.translations && post.translations[currentLang])
    ? post.translations[currentLang]
    : (post.translations && post.translations['en'])
    ? post.translations['en']
    : post; // fallback for old format
}

function renderPosts(posts) {
  const container = document.getElementById('posts-container');
  const t = I18N[currentLang];
  if (!posts.length) {
    container.innerHTML = `<div class="empty"><h3>${t.no_posts}</h3><p>${t.no_posts_sub}</p></div>`;
    return;
  }
  container.innerHTML = posts.map((p, i) => {
    const tr = getT(p);
    return `
    <div class="post-card" onclick="openPost(${i})">
      <div class="post-meta">
        <span class="post-date">${p.date}</span>
        <div class="post-keywords">
          ${(tr.keywords||[]).slice(0,4).map(k=>`<span class="keyword-tag">${k[0]} ${k[1]}</span>`).join('')}
        </div>
      </div>
      <div class="post-title">${tr.title}</div>
      <div class="post-summary">${tr.summary}</div>
      <div class="post-footer">
        ${tr.signals ? `
          <span class="signal-dot">🔴 ${tr.signals.hot||''}</span>
          <span class="signal-dot">🟢 ${tr.signals.grow||''}</span>
        ` : ''}
      </div>
    </div>`;
  }).join('');
}

function renderSidebar(posts) {
  const t = I18N[currentLang];
  document.getElementById('stat-total').textContent = posts.length;
  document.getElementById('stat-last').textContent = posts[0]?.date || '—';
  document.getElementById('archive-list').innerHTML = posts.slice(0,10).map((p,i) =>
    `<div class="archive-item" onclick="openPost(${i})">
      <span class="archive-date">${p.date}</span>
      <span style="color:var(--border)">→</span>
    </div>`
  ).join('');
}

function openPost(idx) {
  const p = allPosts[idx];
  if (!p) return;
  const tr = getT(p);
  const t  = I18N[currentLang];
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-header">
      <div class="modal-date">${p.date}</div>
      <div class="modal-title">${tr.title}</div>
      <div class="modal-intro">${tr.summary}</div>
      <div class="modal-top-keywords">
        ${(tr.keywords||[]).map(k=>`<span class="top-kw">${k[0]} <b>${k[1]}</b> (${k[2]})</span>`).join('')}
      </div>
    </div>
    ${(tr.sections||[]).map(s=>`
      <div class="section-block">
        <h3>${s.title}</h3>
        <p>${s.overview}</p>
        ${(s.items||[]).map(item=>`
          <div class="bullet-item">
            <div class="bullet-dot"></div>
            <div class="bullet-text">
              <strong>${item.label}</strong> — ${item.desc}
              ${item.url ? `<br><a class="bullet-link" href="${item.url}" target="_blank">🔗 ${item.url}</a>` : ''}
            </div>
          </div>`).join('')}
        ${s.insight ? `<div class="insight-box"><p>💡 ${s.insight}</p></div>` : ''}
      </div>`).join('')}
    ${tr.signals ? `
      <div class="section-block">
        <h3>${t.community_temp}</h3>
        <div class="signals-grid">
          <div class="signal-item"><div class="signal-label">${t.hot}</div><div class="signal-value hot">${tr.signals.hot}</div></div>
          <div class="signal-item"><div class="signal-label">${t.grow}</div><div class="signal-value grow">${tr.signals.grow}</div></div>
          <div class="signal-item"><div class="signal-label">${t.warn}</div><div class="signal-value warn">${tr.signals.warn}</div></div>
          <div class="signal-item"><div class="signal-label">${t.shift}</div><div class="signal-value shift">${tr.signals.shift}</div></div>
        </div>
      </div>` : ''}
  `;
  document.getElementById('modal-overlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  document.body.style.overflow = '';
}
document.getElementById('modal-overlay').addEventListener('click', function(e) { if(e.target===this) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

// ── Init ────────────────────────────────────────────────
currentLang = localStorage.getItem('ai-news-lang') || detectLang();
applyLang();
loadPosts();
</script>
</body>
</html>
